name: Mobile Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  android-release:
    name: Android Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Decode Android keystore
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore

      - name: Build Android release artifacts
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/app/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew clean assembleRelease bundleRelease

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
          if-no-files-found: error

      - name: Attach Android artifacts to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab

  ios-release:
    name: iOS Release
    runs-on: macos-latest
    needs: android-release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect iOS project metadata
        id: ios_meta
        shell: bash
        run: |
          set -euo pipefail

          WORKSPACE_FILE="$(find ios -name "*.xcworkspace" | head -n 1 || true)"
          PROJECT_FILE="$(find ios -name "*.xcodeproj" | head -n 1 || true)"

          if [ -n "$WORKSPACE_FILE" ]; then
            SCHEME="$(xcodebuild -list -workspace "$WORKSPACE_FILE" | awk '/Schemes:/{getline; gsub(/^[ \t]+|[ \t]+$/, "", $0); print; exit}')"
            if [ -z "$SCHEME" ]; then
              echo "No scheme found in workspace: $WORKSPACE_FILE"
              exit 1
            fi
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "workspace=$WORKSPACE_FILE" >> "$GITHUB_OUTPUT"
            echo "project=" >> "$GITHUB_OUTPUT"
            echo "scheme=$SCHEME" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -n "$PROJECT_FILE" ]; then
            SCHEME="$(xcodebuild -list -project "$PROJECT_FILE" | awk '/Schemes:/{getline; gsub(/^[ \t]+|[ \t]+$/, "", $0); print; exit}')"
            if [ -z "$SCHEME" ]; then
              echo "No scheme found in project: $PROJECT_FILE"
              exit 1
            fi
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "workspace=" >> "$GITHUB_OUTPUT"
            echo "project=$PROJECT_FILE" >> "$GITHUB_OUTPUT"
            echo "scheme=$SCHEME" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "No iOS workspace/project found under ios/. Skipping iOS release build."
          echo "enabled=false" >> "$GITHUB_OUTPUT"
          echo "workspace=" >> "$GITHUB_OUTPUT"
          echo "project=" >> "$GITHUB_OUTPUT"
          echo "scheme=" >> "$GITHUB_OUTPUT"

      - name: Build iOS app (Release simulator)
        if: ${{ steps.ios_meta.outputs.enabled == 'true' }}
        shell: bash
        run: |
          set -euo pipefail

          DERIVED_DATA="$RUNNER_TEMP/DerivedData"

          if [ -n "${{ steps.ios_meta.outputs.workspace }}" ]; then
            xcodebuild \
              -workspace "${{ steps.ios_meta.outputs.workspace }}" \
              -scheme "${{ steps.ios_meta.outputs.scheme }}" \
              -configuration Release \
              -sdk iphonesimulator \
              -derivedDataPath "$DERIVED_DATA" \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              build
          else
            xcodebuild \
              -project "${{ steps.ios_meta.outputs.project }}" \
              -scheme "${{ steps.ios_meta.outputs.scheme }}" \
              -configuration Release \
              -sdk iphonesimulator \
              -derivedDataPath "$DERIVED_DATA" \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              build
          fi

          APP_PATH="$(find "$DERIVED_DATA/Build/Products" -type d -path "*Release-iphonesimulator/*.app" | head -n 1 || true)"
          if [ -z "$APP_PATH" ]; then
            echo "No .app generated in Release-iphonesimulator output."
            exit 1
          fi

          mkdir -p artifacts/ios
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "artifacts/ios/IntruderSelfie-iOS-Release.zip"

      - name: Upload iOS artifacts
        if: ${{ steps.ios_meta.outputs.enabled == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: ios-release
          path: artifacts/ios/*.zip
          if-no-files-found: error

      - name: Attach iOS artifact to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') && steps.ios_meta.outputs.enabled == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/ios/*.zip
